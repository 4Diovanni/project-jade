name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # segunda-feira, 06:00 UTC

permissions:
  contents: read

jobs:
  bandit:
    name: Bandit (SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install "bandit[toml]"
      - run: bandit -c pyproject.toml -r core tools interfaces main.py

  pip-audit:
    name: pip-audit (dependências)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pip-audit
      # Exceção documentada (ver SECURITY.md > Exceções conhecidas):
      # PYSEC-2026-311 é injeção de código PRÉ-AUTH no SERVIDOR HTTP do ChromaDB
      # (endpoint /api/v2/.../collections com trust_remote_code). NÃO aplicável:
      # usamos chromadb embarcado (PersistentClient, sem servidor/rede) e nunca
      # setamos trust_remote_code. Sem versão corrigida (1.5.9 é a última).
      # Reavaliar quando houver release de chromadb > 1.5.9.
      - run: pip-audit -r requirements.txt --ignore-vuln PYSEC-2026-311

  gitleaks:
    name: Gitleaks (segredos)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
